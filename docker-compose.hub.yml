# L2SC — community marketplace compose dùng image pre-built từ Docker Hub.
# 1 image L2SC all-in-one (backend FastAPI + frontend React static cùng container).
#
# ⚠ Hầu hết user KHÔNG cần self-host L2SC — chỉ cần dùng public instance tại
# https://l2s.io.vn (đã có sẵn community + forum + workflow public).
#
# Self-host khi: muốn private community nội bộ cho team/công ty, hoặc dev
# contributor test L2SC code trước khi PR.
#
# Hướng dẫn cài: xem https://hub.docker.com/r/baphongpine/l2sc (Docker Hub overview)
# hoặc QUICKSTART.md trong repo. Tóm tắt:
#   1. Copy file này thành `docker-compose.yml`
#   2. Tạo `.env` với 2 secret: L2SC_POSTGRES_PASSWORD, L2SC_ADMIN_API_KEY
#   3. docker compose up -d
#   4. Mở http://localhost:9991 → login bằng L2SC_ADMIN_API_KEY (tab API Key)
#
# Bật Cloudflare Tunnel:  COMPOSE_PROFILES=tunnel docker compose up -d
# Update version mới:     docker compose pull && docker compose up -d
# Pin version cụ thể:     set IMAGE_TAG=1.0.0-beta trong .env (default `latest`).

services:
  l2sc:
    image: ${IMAGE_PREFIX:-baphongpine}/l2sc:${IMAGE_TAG:-latest}
    container_name: l2sc-platform
    restart: unless-stopped
    ports:
      # 1 port duy nhất — serve cả UI + API
      - "${L2SC_PORT:-9991}:991"
    environment:
      - DATABASE_URL=postgresql://postgres:${L2SC_POSTGRES_PASSWORD}@postgres:5432/l2sc
      - L2SC_ADMIN_API_KEY=${L2SC_ADMIN_API_KEY:-}
      - L2SC_CORS_ORIGINS=${L2SC_CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: ${L2SC_MEM:-1g}
    cpus: ${L2SC_CPUS:-1.0}

  postgres:
    image: postgres:15-alpine
    container_name: l2sc-platform-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${L2SC_POSTGRES_PASSWORD:?L2SC_POSTGRES_PASSWORD bắt buộc trong .env}
      - POSTGRES_DB=l2sc
    volumes:
      - l2sc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 0.5

  # Cloudflare Tunnel — expose ra Internet qua domain riêng (vd l2s.io.vn).
  # Bật: COMPOSE_PROFILES=tunnel docker compose up -d
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: l2sc-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - l2sc
    mem_limit: 256m
    cpus: 0.25

volumes:
  l2sc_postgres_data:

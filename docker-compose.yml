services:
  l2sc:
    build: .
    container_name: l2sc-service
    ports:
      - "991:991"
    environment:
      - DATABASE_URL=postgresql://postgres:${L2SC_POSTGRES_PASSWORD:-postgres}@postgres:5432/l2sc
      - L2SC_ADMIN_API_KEY=${L2SC_ADMIN_API_KEY:-}   # để trống = random mỗi lần start
      - L2SC_RATE_LIMIT_ENABLED=${L2SC_RATE_LIMIT_ENABLED:-true}
      - L2SC_DOCS_ENABLED=${L2SC_DOCS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    volumes:
      - ./backend:/app/backend   # hot reload khi dev

  frontend:
    image: node:18-alpine
    container_name: l2sc-frontend
    working_dir: /app
    ports:
      - "9991:9991"
    environment:
      # Dev local: để trống → relative URL + Vite proxy /api → backend.
      # Production tách domain: set VITE_L2SC_API_URL=https://service.l2s.io.vn.
      - VITE_L2SC_API_URL=${VITE_L2SC_API_URL:-}
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    depends_on:
      - l2sc
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0

  postgres:
    image: postgres:15-alpine
    container_name: l2sc-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${L2SC_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=l2sc
    ports:
      - "9992:5432"
    volumes:
      - l2sc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

  # Cloudflare Tunnel — expose L2SC ra Internet qua domain l2s.io.vn
  # KHÔNG mặc định bật; opt-in bằng `--profile tunnel` hoặc COMPOSE_PROFILES=tunnel.
  #
  # Setup 1 lần (Cloudflare Zero Trust → Networks → Tunnels):
  #   1. Create tunnel "l2sc" → copy token vào CLOUDFLARE_TUNNEL_TOKEN trong .env
  #   2. Public Hostnames tab — add 2 ingress (theo thứ tự):
  #      - l2s.io.vn  Path: /api/*   →  http://l2sc-service:991
  #      - l2s.io.vn  (no path)      →  http://l2sc-frontend:9991
  #      Catch-all: 404
  #   3. COMPOSE_PROFILES=tunnel docker compose up -d
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: l2sc-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - l2sc
      - frontend
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "info"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    cpus: 0.25

volumes:
  l2sc_postgres_data:
